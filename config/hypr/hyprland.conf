# ⚡ CYBER-TUNG HYPRLAND CONFIG
# ============================================================
# ── BIẾN ────────────────────────────────────────────────────
$mainMod = SUPER
$scripts = ~/scripts
# ── MÀN HÌNH ────────────────────────────────────────────────
monitor = , preferred, auto, 1
# ── TỰ ĐỘNG CHẠY ────────────────────────────────────────────
exec-once = nm-applet --indicator &
exec-once = fcitx5 -d &
exec-once = mako &
exec-once = swww-daemon &
# exec-once = waybar
exec-once = eww --config ~/CyberDotfiles/config/eww daemon && sleep 0.3 && eww --config ~/CyberDotfiles/config/eww open bar && eww --config ~/CyberDotfiles/config/eww open bar-sigil-left && eww --config ~/CyberDotfiles/config/eww open bar-sigil-right
exec-once = wal -R &
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sleep 0.5 && swww img "$(cat ~/.cache/wal/wal)" --transition-type simple
exec-once = tlp start
exec-once = gvfs-mount &
exec-once = ~/CyberDotfiles/scripts/cyberguard.sh &
exec-once = noisetorch -i -t 85
# ── NHẬP LIỆU ───────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0
    touchpad {
        natural_scroll = 1
        tap-to-click   = 1
    }
}
# ── GIAO DIỆN ───────────────────────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2
    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}
# ── TRANG TRÍ ───────────────────────────────────────────────
decoration {
    rounding = 12
    active_opacity   = 0.98
    inactive_opacity = 0.60
    blur {
        enabled = true
        size    = 10
        passes  = 3
        brightness        = 1.5
        contrast          = 1.2
        vibrancy          = 0.6
        vibrancy_darkness = 0.0
        new_optimizations = true
        ignore_opacity    = true
    }
    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(0, 0, 0, 0.15)
    }
}
# ── MISC ────────────────────────────────────────────────────
misc {
    disable_hyprland_logo      = true
    disable_splash_rendering   = true
    force_default_wallpaper    = 0
    mouse_move_enables_dpms    = true
    vfr                        = true
    vrr                        = 0
    animate_manual_resizes     = true
    mouse_move_focuses_monitor = true
    enable_swallow             = true
    swallow_regex              = ^(kitty)$
}
# ── ANIMATIONS ──────────────────────────────────────────────
animations {
    enabled = true
    bezier = shot, 0.2, 1, 0.2, 1
    animation = windows,    1, 5, shot, slide
    animation = windowsOut, 1, 5, shot, slide
    animation = fade,       1, 5, shot
    animation = fadeIn,     1, 4, shot
    animation = fadeOut,    1, 6, shot
    animation = workspaces, 1, 5, shot, slide
}
# ════════════════════════════════════════════════════════════
# PHÍM TẮT
# ════════════════════════════════════════════════════════════
# ── APPS ────────────────────────────────────────────────────
bind = $mainMod, Q,     exec, kitty
bind = $mainMod, E,     exec, thunar
bind = $mainMod, G,     exec, google-chrome-stable
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, V,     togglefloating,
# ── HỆ THỐNG ────────────────────────────────────────────────
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, L, exec, wlogout
bind = $mainMod, P, exec, hyprlock
# bind = $mainMod, B, exec, killall -SIGUSR1 waybar
bind = $mainMod, B, exec, ~/CyberDotfiles/config/eww/scripts/toggle-bar.sh
bind = $mainMod, I, exec, eww open --toggle control_center
# ── SCREENSHOT ──────────────────────────────────────────────
bind = $mainMod SHIFT, S, exec, grimblast --notify save area ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = , Print,           exec, grimblast --notify save screen ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png
# ── CỬA SỔ ──────────────────────────────────────────────────
bind = $mainMod, F,   fullscreen, 0
bind = $mainMod, Tab, workspace, previous
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive,  10 0
binde = , left,  resizeactive, -10 0
binde = , up,    resizeactive,  0 -10
binde = , down,  resizeactive,  0  10
bind  = , escape, submap, reset
submap = reset
# ── WORKSPACES ──────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
# ── MEDIA KEYS ──────────────────────────────────────────────
bindle = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindle = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# ── CHUỘT ───────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# ── TIỆN ÍCH ────────────────────────────────────────────────
bind = $mainMod, W,  exec, ~/scripts/wallpaper_engine.sh
bind = $mainMod, F1, exec, ~/CyberDotfiles/scripts/keyhints.sh
